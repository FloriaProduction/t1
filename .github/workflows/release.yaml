name: Build and Publish to TestPyPI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        # python-version: ["3.12", "3.13", "3.14"]
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tool
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build -w -s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/

  test:
    name: Test installed wheel on ${{ matrix.os }}
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        # python-version: ["3.12", "3.13", "3.14"]
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            tests
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/

      - name: Install wheel into fresh environment
        run: |
          pip install dist/*.whl
          pip install pytest
        shell: bash

      - name: Run tests
        run: |
          ls -a tests/ 
          python -m pytest tests/
        shell: bash

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [test]
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all/
          pattern: dist-*
          merge-multiple: true

      - name: Publish to TestPyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist-all/
