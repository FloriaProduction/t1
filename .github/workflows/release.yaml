name: Build and Publish to TestPyPI

on:
  push:
    branches: [main]
  workflow_dispatch: # Возможность запуска вручную

permissions:
  id-token: write # Необходимо для Trusted Publishing (OIDC)

jobs:
  # 1. Собираем sdist (source distribution) один раз
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # 2. Собираем wheel для Linux и Windows под нужные версии Python
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # Собираем только для CPython 3.12, 3.13, 3.14
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          # Пропускаем архитектуру i686, если не нужна
          CIBW_ARCHS: auto

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  test_wheels:
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }} # или перебрать версии матрицей
      - name: Test wheel
        run: |
          pip install -e (ls dist/*.whl)[0][test]
          pytest tests

  # 3. Публикация на TestPyPI после успешной сборки sdist и всех wheel
  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build_sdist, build_wheels]

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-* # Скачивает все артефакты с именами, начинающимися на "wheels-"
          path: dist
          merge-multiple: true # Все wheel попадут в одну папку dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Доверенная публикация работает без явного указания токена,
          # если у GitHub Actions есть права id-token: write и
          # настроен Trusted Publisher на TestPyPI
