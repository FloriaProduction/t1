name: Build and Publish to TestPyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # Возможность запуска вручную

permissions:
  id-token: write # Необходимо для Trusted Publishing (OIDC)

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tool
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/

  test:
    name: Test installed wheel on ${{ matrix.os }}
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4 # нужен только для тестов (если они лежат в репозитории)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/

      - name: Install wheel into fresh environment
        run: |
          python -m venv /tmp/test-venv
          # Активируем venv (кроссплатформенно)
          /tmp/test-venv/bin/pip install dist/*.whl
          # Установим средства тестирования
          /tmp/test-venv/bin/pip install pytest
        shell: bash

      - name: Run tests from a safe directory
        # Запускаем тесты из временной папки, передавая абсолютный путь к тестам
        run: |
          cd ${{ runner.temp }}
          /tmp/test-venv/bin/python -m pytest ${{ github.workspace }}/tests
        shell: bash
